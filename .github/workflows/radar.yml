name: Radar SOL

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-sol
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar Radar SOL
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python radar_sol.py

      - name: Guardar estado y publicar data.json
        run: |
          git config user.name "radar-sol-bot"
          git config user.email "radar-sol-bot@users.noreply.github.com"
          git add seen.json data.json
          if ! git diff --cached --quiet; then
            git commit -m "radar: estado + data.json [skip ci]"
            git push
          else
            echo "Sin cambios."
          fi
